<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hopeland Calendar Sync</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #2d3748; }
  h1   { font-size: 1.4rem; }
  p    { color: #718096; font-size: 0.9rem; line-height: 1.6; }
  .url-box { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 14px 16px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 20px 0; }
  .label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #a0aec0; margin-bottom: 6px; }
</style>
</head>
<body>
<h1>Hopeland &mdash; Between the Stars &amp; Shore</h1>
<p>This page hosts a merged iCal feed combining availability from Airbnb, Outdoorsy, and RVshare. Import the URL below into each platform to keep calendars in sync automatically.</p>
<div class="label">Merged iCal Feed URL</div>
<div class="url-box" id="url">Loading…</div>
<p>Auto-updates every 30 minutes via GitHub Actions.</p>
<script>
  document.getElementById('url').textContent = location.origin + location.pathname.replace(/\/?$/, '/') + 'merged.ics';
</script>
</body>
</html>
